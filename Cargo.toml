[package]
name = "connections"
edition = "2024"
version = "0.1.0"
rust-version = "1.85"
license = "MIT"
description = "Galois connections and lattice-based numerical conversions"
repository = "https://gitlab.com/cmk/connections"
homepage = "https://gitlab.com/cmk/connections"
documentation = "https://docs.rs/connections"
readme = "README.md"
keywords = ["galois", "connection", "lattice", "fixed-point", "conversion"]
categories = ["mathematics", "encoding"]

# Trim the published archive to user-facing artifacts only. Cargo's
# default behavior ships everything not gitignored — including
# ~600KB of internal sprint plans, reviews, dev tool config, and
# Claude-agent instructions. None of that helps a downstream
# consumer; the exclude block keeps the .crate to ~src + tests +
# README + LICENSE + CHANGELOG.
exclude = [
    "/.claude",
    "/.gitlab-ci.yml",
    "/.gitleaks.toml",
    "/CLAUDE.md",
    "/CODEOWNERS",
    "/deny.toml",
    "/doc",
    "/proptest.toml",
    "/proptest-regressions",
    "/rust-toolchain.toml",
    "/rustfmt.toml",
    "/scripts",
]

[dependencies]
fixed = "1"
half = { version = "2", default-features = false }
time = "0.3"
proptest = { version = "1", optional = true }

[dev-dependencies]
proptest = "1"

[features]
# Expose `connections::property::arb` (proptest strategies) to
# downstream crates. The `connections::property::laws` predicates
# are always public — they only depend on this crate's own types
# (Conn, Ple, Heyting, …) and don't need proptest at all.
testing = ["dep:proptest"]

# docs.rs builds the published crate with default features only by
# default; opt into `all-features` so `property::arb` (gated on
# `testing`) renders. The `--cfg docsrs` flag activates the
# `#[cfg_attr(docsrs, doc(cfg(feature = "testing")))]` mirrors that
# surface the gating in the rendered docs.
[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]
