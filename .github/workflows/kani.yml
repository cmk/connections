name: Kani

on:
  push:
    tags: ['*']
  schedule:
    - cron: '0 5 * * 0'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  kani:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: model-checking/kani-github-action@v1.1
        with:
          # `hifi` excluded: Kani sets `--cfg kani` globally, so it also
          # compiles hifitime's own `src/epoch/kani_verif.rs`, which uses
          # `Epoch::now()` / `system_time` — both `#[cfg(feature = "std")]`.
          # We pull hifitime `default-features = false` (its `std` pulls
          # serde + web-time + snafu), so those items are configured out and
          # hifitime's harness fails to compile, taking the whole run with
          # it. Re-add `hifi` once hifitime gates that module behind `std`.
          args: '--features fixed,uhlc'
