stages:
  - check
  - test
  - audit

default:
  image: rust:1.85
  cache:
    key: cargo
    paths:
      - target/
      - .cargo/

variables:
  CARGO_TERM_COLOR: always

fmt:
  stage: check
  before_script:
    - rustup component add rustfmt
  script:
    - cargo fmt --all -- --check
  allow_failure: true

clippy:
  stage: check
  before_script:
    - rustup component add clippy
  script:
    - cargo clippy --all-targets -- -D warnings

test:
  stage: test
  script:
    - cargo test --workspace

deny:
  stage: audit
  before_script:
    # Pin cargo-deny exactly to 0.18.3 — the last release compatible
    # with rustc 1.85 (this project's rust-toolchain.toml pin).
    # cargo-deny 0.18.9 and 0.19.x bumped MSRV to 1.88; cargo's own
    # install error suggests 0.18.3 as the supported version.
    # Bump both cargo-deny and rust-toolchain together if we need
    # newer deny rules.
    - cargo install --locked cargo-deny --version '=0.18.3'
  script:
    - cargo deny check

gitleaks:
  stage: audit
  # The `zricethezav/gitleaks:latest` image has `gitleaks` as its
  # ENTRYPOINT, so GitLab's default shell-based script invocation fails
  # with `unknown command "sh" for "gitleaks"`. Override the entrypoint
  # to empty so GitLab can run its own shell; the script then calls
  # gitleaks explicitly.
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  cache: []
  script:
    - gitleaks detect --source . --verbose --config .gitleaks.toml

claude-review:
  stage: audit
  image: python:3.12-slim
  cache: []
  # Needs full history so `git diff base...head` can resolve the
  # merge-base commit; GitLab's default GIT_DEPTH is shallow.
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apt-get update -qq && apt-get install -qq -y git
    - pip install --quiet anthropic
  script:
    - python3 scripts/claude_review.py
  # Advisory, never blocking: a misread from the AI reviewer must not
  # wedge a merge. Findings land as MR discussions — triage via the
  # usual /pull-reviews → fix → /reply-reviews loop.
  allow_failure: true
  # Job-level retry rides out longer Anthropic 5xx / 529 windows than
  # the SDK's in-process backoff. On script_failure GitLab reruns the
  # whole job up to 2 more times (each retry is scheduled by the
  # runner; load blips of a minute or two usually clear between).
  retry:
    max: 2
    when:
      - script_failure
      - api_failure
      - runner_system_failure
  rules:
    # Fire on MR events when both secrets are wired. This keeps the
    # job invisible until Project → Settings → CI/CD → Variables has
    # ANTHROPIC_API_KEY and GITLAB_TOKEN set.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $ANTHROPIC_API_KEY && $GITLAB_TOKEN
    # Manual re-trigger: `glab ci run --variables CLAUDE_REVIEW_MR=N
    # --branch <any-branch>` (or the "Run pipeline" web UI with
    # CLAUDE_REVIEW_MR set). The branch is irrelevant — the script
    # reads CLAUDE_REVIEW_MR, fetches the MR's actual base/head SHAs
    # from the GitLab API, and runs `git fetch origin <sha>` to pull
    # them into the local clone. CI_COMMIT_SHA (main's tip or whatever
    # branch was chosen) is ignored on this path.
    - if: $CLAUDE_REVIEW_MR && $ANTHROPIC_API_KEY && $GITLAB_TOKEN
