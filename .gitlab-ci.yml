# One pipeline per push. When an MR is open, the merge-request pipeline
# is canonical (and is what GitLab attaches to the MR view); when no MR
# is open, the branch pipeline runs the same jobs. This means `fmt`,
# `clippy`, `test`, `deny`, `gitleaks` show up on the MR pipeline page
# the moment an MR is opened, instead of being hidden in a separate
# "Branch pipelines" tab.
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

stages:
  - check
  - test
  - audit

default:
  image: rust:1.85
  # Cache only the Cargo registry index + cache + git DB — never
  # `target/`. `target/` was 2.6 GB locally and was being pulled +
  # pushed by every job (fmt/clippy/doc/test) under a single shared
  # `cargo` key, moving ~20 GB of cache traffic per pipeline. The
  # registry directories total ~50 MB and only invalidate when
  # `Cargo.lock` changes, so most pipelines hit a warm cache with no
  # re-upload.
  #
  # Default `policy: pull` so most jobs only download. The `test`
  # job overrides to `pull-push` to actually populate the cache —
  # it's the heaviest consumer and runs once per pipeline.
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - .cargo/git/db/
    policy: pull

variables:
  CARGO_TERM_COLOR: always
  # Force cargo to use a project-relative home so the registry cache
  # lands inside `$CI_PROJECT_DIR/.cargo/` (the only path GitLab cache
  # can reach). Default `~/.cargo/` is `/root/.cargo/` in the rust
  # image and is not cacheable.
  CARGO_HOME: $CI_PROJECT_DIR/.cargo

fmt:
  stage: check
  # `cargo fmt --check` reads source only; no cargo registry needed.
  # Skip the cache to avoid pulling ~50 MB of registry tarball for
  # nothing.
  cache: []
  before_script:
    - rustup component add rustfmt
  script:
    - cargo fmt --all -- --check

clippy:
  stage: check
  before_script:
    - rustup component add clippy
  script:
    - cargo clippy --all-targets -- -D warnings

doc:
  stage: check
  # Catch broken intra-doc links and rustdoc warnings before docs.rs
  # builds the published release. `--features testing` matches the
  # docs.rs config in Cargo.toml so feature-gated items (property::arb)
  # render the same way locally as on docs.rs. Cannot use
  # `--all-features` here: the `f16` feature activates
  # `#![cfg_attr(feature = "f16", feature(f16))]`, a nightly-only
  # attribute that errors on this CI image's stable rustc.
  variables:
    RUSTDOCFLAGS: "-D warnings"
  script:
    - cargo doc --no-deps --features testing --document-private-items
  # Gate doc to MR pipelines + post-merge main runs. Mid-sprint pushes
  # to a feature branch with no MR open don't need doc validation
  # (rustdoc warnings won't have shifted between sibling commits).
  # MR pipelines still gate the merge; main confirms the rendered
  # state landed.
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

test:
  stage: test
  # The test job is the heaviest consumer of the registry cache —
  # `cargo nextest run --workspace` resolves and downloads every
  # transitive dependency. Override the default `policy: pull` to
  # `pull-push` so this job is the one that populates the cache for
  # the next pipeline. Other jobs (fmt has cache: []; clippy/doc
  # inherit pull only) consume what the most-recent test job pushed.
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/index/
      - .cargo/registry/cache/
      - .cargo/git/db/
    policy: pull-push
  before_script:
    # Use the prebuilt cargo-nextest binary instead of `cargo install
    # --locked cargo-nextest` (which compiles from source — about
    # 5 minutes per CI run). Download is ~5MB and unpack is ~5
    # seconds. Mirrors the cargo-deny pattern in the `deny` job.
    #
    # Pin cargo-nextest exactly to 0.9.133. Bump in a single commit
    # when the upstream `[profile.ci]` schema changes.
    - 'curl -fsSL "https://get.nexte.st/0.9.133/linux" | tar -xz -C /usr/local/bin cargo-nextest'
  script:
    # `nextest` parallelizes individual `#[test]` fns (vs `cargo test`
    # which parallelizes only test binaries). Per-test timings are
    # printed natively; the `[profile.ci]` block in
    # `.config/nextest.toml` controls slow-timeout and fail-fast.
    - cargo nextest run --workspace --profile ci
    # nextest doesn't run doctests; keep `cargo test --doc` as a
    # separate, fast pass to maintain doctest coverage.
    - cargo test --workspace --doc

deny:
  stage: audit
  before_script:
    # Use the prebuilt cargo-deny binary instead of `cargo install
    # --locked cargo-deny` (which compiles cargo-deny + ~100 deps
    # including rustfmt and fs-err from source — about 10 minutes
    # per CI run). Download is ~5MB and unpack is ~5 seconds.
    #
    # Pin cargo-deny exactly to 0.18.3 — the last release compatible
    # with rustc 1.85 (this project's rust-toolchain.toml pin).
    # 0.18.9 and 0.19.x bumped MSRV to 1.88; bump both cargo-deny
    # and rust-toolchain together if we need newer deny rules.
    - 'curl -fsSL "https://github.com/EmbarkStudios/cargo-deny/releases/download/0.18.3/cargo-deny-0.18.3-x86_64-unknown-linux-musl.tar.gz" | tar -xz -C /tmp'
    - install -m 755 /tmp/cargo-deny-0.18.3-x86_64-unknown-linux-musl/cargo-deny /usr/local/bin/cargo-deny
  script:
    # Skip the `advisories` subcheck: cargo-deny 0.18.3 cannot parse
    # RUSTSEC advisories that use CVSS 4.0 (support landed in 0.19+,
    # which requires rustc 1.88+). The whole advisory DB fails to
    # load — `[advisories] ignore = [...]` in deny.toml does not
    # help because filtering happens after load. `licenses`, `bans`,
    # and `sources` all parse normally and stay enforced.
    #
    # When rust-toolchain.toml bumps to 1.88+, drop the explicit
    # subcheck list to re-enable advisories.
    - cargo-deny check licenses bans sources
  # `deny` audits a snapshot of dependencies; the inputs don't move
  # between sibling commits on a feature branch. Run once per landed
  # change (post-merge on main) and on scheduled pipelines, not on
  # every push/MR.
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"

gitleaks:
  stage: audit
  # The `zricethezav/gitleaks:latest` image has `gitleaks` as its
  # ENTRYPOINT, so GitLab's default shell-based script invocation fails
  # with `unknown command "sh" for "gitleaks"`. Override the entrypoint
  # to empty so GitLab can run its own shell; the script then calls
  # gitleaks explicitly.
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  cache: []
  script:
    - gitleaks detect --source . --verbose --config .gitleaks.toml
  # Same cadence rationale as `deny`: secret scans match this commit's
  # working tree, but a leak introduced earlier on a feature branch
  # will still get caught on the post-merge run on `main`. Skip the
  # per-MR run to save ~30s per pipeline.
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"

claude-review:
  stage: audit
  image: python:3.12-slim
  cache: []
  # Needs full history so `git diff base...head` can resolve the
  # merge-base commit; GitLab's default GIT_DEPTH is shallow.
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apt-get update -qq && apt-get install -qq -y git
    - pip install --quiet anthropic
  script:
    - python3 scripts/claude_review.py
  # Advisory, never blocking: a misread from the AI reviewer must not
  # wedge a merge. Findings land as MR discussions — triage via the
  # usual /pull-reviews → fix → /reply-reviews loop.
  allow_failure: true
  # Job-level retry rides out longer Anthropic 5xx / 529 windows than
  # the SDK's in-process backoff. On script_failure GitLab reruns the
  # whole job up to 2 more times (each retry is scheduled by the
  # runner; load blips of a minute or two usually clear between).
  retry:
    max: 2
    when:
      - script_failure
      - api_failure
      - runner_system_failure
  rules:
    # Fire on MR events when both secrets are wired. This keeps the
    # job invisible until Project → Settings → CI/CD → Variables has
    # ANTHROPIC_API_KEY and GITLAB_TOKEN set.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $ANTHROPIC_API_KEY && $GITLAB_TOKEN
    # Manual re-trigger: `glab ci run --variables CLAUDE_REVIEW_MR=N
    # --branch <any-branch>` (or the "Run pipeline" web UI with
    # CLAUDE_REVIEW_MR set). The branch is irrelevant — the script
    # reads CLAUDE_REVIEW_MR, fetches the MR's actual base/head SHAs
    # from the GitLab API, and runs `git fetch origin <sha>` to pull
    # them into the local clone. CI_COMMIT_SHA (main's tip or whatever
    # branch was chosen) is ignored on this path.
    - if: $CLAUDE_REVIEW_MR && $ANTHROPIC_API_KEY && $GITLAB_TOKEN
