stages:
  - check
  - test
  - audit

default:
  image: rust:1.85
  cache:
    key: cargo
    paths:
      - target/
      - .cargo/

variables:
  CARGO_TERM_COLOR: always

fmt:
  stage: check
  before_script:
    - rustup component add rustfmt
  script:
    - cargo fmt --all -- --check
  allow_failure: true

clippy:
  stage: check
  before_script:
    - rustup component add clippy
  script:
    - cargo clippy --all-targets -- -D warnings

test:
  stage: test
  script:
    - cargo test --workspace

deny:
  stage: audit
  before_script:
    - cargo install --locked cargo-deny
  script:
    - cargo deny check

gitleaks:
  stage: audit
  image: zricethezav/gitleaks:latest
  cache: []
  script:
    - gitleaks detect --source . --verbose

claude-review:
  stage: audit
  image: python:3.12-slim
  cache: []
  # Needs full history so `git diff base...head` can resolve the
  # merge-base commit; GitLab's default GIT_DEPTH is shallow.
  variables:
    GIT_DEPTH: "0"
  before_script:
    - apt-get update -qq && apt-get install -qq -y git
    - pip install --quiet anthropic
  script:
    - python3 scripts/claude_review.py
  # Advisory, never blocking: a misread from the AI reviewer must not
  # wedge a merge. Findings land as MR discussions — triage via the
  # usual /pull-reviews → fix → /reply-reviews loop.
  allow_failure: true
  rules:
    # Only on MR events, and only when both secrets are wired. This
    # keeps the job invisible until Project → Settings → CI/CD →
    # Variables has ANTHROPIC_API_KEY and GITLAB_TOKEN set.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $ANTHROPIC_API_KEY && $GITLAB_TOKEN
