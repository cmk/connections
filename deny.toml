# cargo-deny configuration. Run locally with `cargo deny check` (after
# `cargo install cargo-deny`); CI runs the same via the `deny` job in
# `.github/workflows/ci.yml`.

[advisories]
# Fail the build on any unpatched RUSTSEC advisory affecting the
# dependency graph. Yanked crates are a warning (sometimes unavoidable
# transitively) rather than an error.
yanked = "warn"
ignore = [
    # RUSTSEC-2026-0009 — `time` < 0.3.47 DoS via stack exhaustion in
    # the RFC-2822 parser. We're pinned to `time = ">=0.3, <0.3.46"`
    # to avoid 0.3.46's stricter `year >= -9999` assertion that our
    # `arb_offset_dt` proptest strategy trips on at the Date::MIN
    # boundary with a non-zero UTC offset. Connections does not call
    # any RFC-2822 parser path (no `parse(Rfc2822)`, no
    # `OffsetDateTime::parse(_, &Rfc2822)`), so the attack surface
    # is zero for our usage. Drop this entry after clamping
    # `arb_date()`'s year range so we can float `time = "0.3"` and
    # adopt the fix that landed in 0.3.47.
    "RUSTSEC-2026-0009",
]

[bans]
# Multiple versions of the same crate usually indicate a dependency
# that hasn't been updated; warn so it's visible in `cargo deny check`
# output without blocking unrelated work.
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal crates declared as `{ path = "..." }` and
# referenced as `{ workspace = true }` read as wildcard version specs;
# exempt path-based deps so the `wildcards = deny` rule only fires on
# external registry crates.
allow-wildcard-paths = true
highlight = "all"

[licenses]
version = 2
# Permissive licenses that compose cleanly with MIT (this crate's
# license). Extend as needed, but keep the list explicit — a copyleft
# surprise should require a conscious decision.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]
confidence-threshold = 0.8

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
